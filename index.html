<script>
const styles = [
  "Make this more professional:",
  "Rewrite this in a persuasive way:",
  "Improve this text with better wording:",
  "Make this sound more powerful:",
  "Rewrite this like a high-level copywriter:"
];

function improve() {
  let text = document.getElementById("input").value;

  let uses = localStorage.getItem("uses") || 0;
  let isPro = localStorage.getItem("pro") === "true";

  if (!isPro && uses >= 3) {
    alert("Limit reached. Upgrade to Pro.");
    return;
  }

  let randomStyle = styles[Math.floor(Math.random() * styles.length)];

  let improved = randomStyle + "\n\n" + text + " 🚀 (enhanced version with better structure and impact)";

  document.getElementById("output").innerText = improved;

  uses++;
  localStorage.setItem("uses", uses);
}
</script>
