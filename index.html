<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Norepi AI</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
  background: radial-gradient(circle at top, #0a0a0a, #000);
  color: white;
}

/* NAV */
nav {
  display: flex;
  justify-content: space-between;
  padding: 25px 60px;
  align-items: center;
}

.logo {
  font-size: 22px;
  font-weight: bold;
  letter-spacing: 3px;
  background: linear-gradient(90deg, #ff3c00, #ff9500);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* HERO */
.hero {
  text-align: center;
  margin-top: 100px;
}

.hero h1 {
  font-size: 65px;
}

.gradient {
  background: linear-gradient(90deg, #ff3c00, #ff9500);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.hero p {
  opacity: 0.7;
  margin-top: 15px;
}

/* GLASS BOX */
.glass {
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  padding: 30px;
  width: 90%;
  max-width: 600px;
  margin: 50px auto;
  border: 1px solid rgba(255,255,255,0.1);
}

/* INPUT */
textarea {
  width: 100%;
  height: 120px;
  background: transparent;
  border: none;
  color: white;
  outline: none;
}

/* BUTTON */
button {
  margin-top: 20px;
  padding: 15px 30px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(90deg, #ff3c00, #ff9500);
  color: white;
  cursor: pointer;
  font-size: 16px;
}

/* RESULT */
.result {
  margin-top: 20px;
  opacity: 0.8;
}

/* PRICING */
.pricing {
  margin-top: 100px;
  display: flex;
  justify-content: center;
  gap: 30px;
}

.card {
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.05);
  padding: 30px;
  border-radius: 20px;
  width: 250px;
  border: 1px solid rgba(255,255,255,0.1);
}

.price {
  font-size: 30px;
  margin: 15px 0;
}

/* FOOTER */
footer {
  margin-top: 150px;
  text-align: center;
  opacity: 0.5;
  padding: 40px;
}
</style>
</head>

<body>

<nav>
  <div class="logo">N</div>
  <div>Product • Pricing • About</div>
</nav>

<div class="hero">
  <h1><span class="gradient">AI Writing</span><br>Reinvented</h1>
  <p>Turn simple text into powerful communication instantly.</p>
</div>

<div class="glass">
  <textarea id="input" placeholder="Write something..."></textarea>
  <button onclick="improve()">Enhance Text</button>
  <div class="result" id="output"></div>
</div>

<div class="pricing">
  <div class="card">
    <h3>Free</h3>
    <div class="price">$0</div>
    <p>3 generations/day</p>
  </div>

  <div class="card">
    <h3>Pro</h3>
    <div class="price">$29/mo</div>
    <p>Unlimited + better results</p>
    <button onclick="buy()">Upgrade</button>
  </div>
</div>

<footer>
  © 2026 Norepi. All rights reserved.
</footer>

<script>
let uses = 0;

function improve() {
  let text = document.getElementById("input").value;

  if (!text) {
    alert("Write something first.");
    return;
  }

  if (uses >= 3) {
    alert("Free limit reached. Upgrade to Pro.");
    return;
  }

  const styles = [
    "Professional rewrite:",
    "Persuasive version:",
    "Confident tone:",
    "High-impact rewrite:"
  ];

  let style = styles[Math.floor(Math.random() * styles.length)];

  let result = style + "\n\n" + text + " — refined with clarity, stronger wording, and better flow.";

  document.getElementById("output").innerText = result;

  uses++;
}

function buy() {
  window.location.href = "https://example.com";
}
</script>

</body>
</html>
