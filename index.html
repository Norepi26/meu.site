<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Norepi AI</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {background:#000;color:white;text-align:center;font-family:sans-serif;}
textarea {width:80%;height:120px;background:#111;color:white;border:none;}
button {margin-top:10px;padding:12px;background:linear-gradient(red,orange);border:none;color:white;}
.lock {position:fixed;top:0;left:0;width:100%;height:100%;background:black;display:none;justify-content:center;align-items:center;flex-direction:column;}
</style>
</head>

<body>

<h1>Norepi AI</h1>

<button onclick="signUp()">Sign Up</button>
<button onclick="login()">Login</button>

<br>

<textarea id="input"></textarea><br>
<button onclick="runAI()">Run</button>

<p id="output"></p>

<div class="lock" id="lock">
  <h2>Upgrade Required</h2>
  <button onclick="buy()">Upgrade</button>
</div>

<script>
const supabaseClient = supabase.createClient(
  "SUA_URL",
  "SUA_KEY"
);

let user = null;

supabaseClient.auth.getSession().then(({ data }) => {
  user = data.session?.user;
});

async function signUp(){
  let email = prompt("email");
  let password = prompt("password");
  await supabaseClient.auth.signUp({email,password});
  alert("check email");
}

async function login(){
  let email = prompt("email");
  let password = prompt("password");
  const { data } = await supabaseClient.auth.signInWithPassword({email,password});
  user = data.user;
  alert("logged");
}

async function runAI(){
  if(!user){ alert("login"); return; }

  let text = document.getElementById("input").value;

  const { data } = await supabaseClient
    .from("profiles")
    .select("*")
    .eq("id", user.id)
    .single();

  if(!data.pro && data.uses >= 3){
    document.getElementById("lock").style.display="flex";
    return;
  }

  document.getElementById("output").innerText="thinking...";

  const res = await fetch("SUA_FUNCTION_URL", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({text})
  });

  const result = await res.json();

  document.getElementById("output").innerText = result.result;

  await supabaseClient
    .from("profiles")
    .update({ uses: data.uses + 1 })
    .eq("id", user.id);
}

function buy(){
  window.location.href="SEU_STRIPE_LINK";
}
</script>

</body>
</html>
