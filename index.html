<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Norepi AI</title>

<style>
body {
  background: radial-gradient(circle at top, #0a0a0a, #000);
  color: white;
  font-family: -apple-system, sans-serif;
  text-align: center;
}

/* HERO */
h1 {
  margin-top: 80px;
  font-size: 55px;
}

.gradient {
  background: linear-gradient(90deg, #ff3c00, #ff9500);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* GLASS BOX */
.box {
  margin: 40px auto;
  width: 90%;
  max-width: 600px;
  padding: 25px;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
}

textarea {
  width: 100%;
  height: 120px;
  background: transparent;
  border: none;
  color: white;
  outline: none;
}

button {
  margin-top: 15px;
  padding: 15px 30px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(90deg, #ff3c00, #ff9500);
  color: white;
  cursor: pointer;
}

/* RESULT */
.result {
  margin-top: 20px;
}

/* COPY BUTTON */
.copy {
  margin-top: 10px;
  background: #222;
}

/* LOCK SCREEN */
.lock {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  backdrop-filter: blur(30px);
  background: rgba(0,0,0,0.9);
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.lock h2 {
  font-size: 30px;
}

footer {
  margin-top: 120px;
  opacity: 0.4;
}
</style>
</head>

<body>

<h1><span class="gradient">Messages</span><br>That Get Replies</h1>

<div class="box">
  <textarea id="input" placeholder="Write your message..."></textarea>
  <button onclick="improve()">Enhance</button>

  <div class="result" id="output"></div>
  <button class="copy" onclick="copyText()">Copy</button>
</div>

<div class="lock" id="lock">
  <h2>Unlock Unlimited Access</h2>
  <p>You reached your free limit.</p>
  <button onclick="buy()">Upgrade Now</button>
</div>

<footer>© 2026 Norepi. All rights reserved.</footer>

<script>
let uses = localStorage.getItem("uses") || 0;
let pro = localStorage.getItem("pro") === "true";

async function improve() {
  let text = document.getElementById("input").value;

  if (!text) {
    alert("Write something first.");
    return;
  }

  if (!pro && uses >= 3) {
    document.getElementById("lock").style.display = "flex";
    return;
  }

  document.getElementById("output").innerText = "Thinking...";

  try {
    const res = await fetch("https://api.openai.com/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": "Bearer SUA_API_KEY",
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: "gpt-4o-mini",
        messages: [
          {
            role: "system",
            content: "Rewrite messages to get replies. Be natural, persuasive and never generic."
          },
          {
            role: "user",
            content: text
          }
        ]
      })
    });

    const data = await res.json();

    document.getElementById("output").innerText =
      data.choices[0].message.content;

  } catch (e) {
    document.getElementById("output").innerText = "Error loading AI.";
  }

  uses++;
  localStorage.setItem("uses", uses);
}

function copyText() {
  let text = document.getElementById("output").innerText;
  navigator.clipboard.writeText(text);
  alert("Copied!");
}

function buy() {
  window.location.href = "COLE_SEU_LINK_STRIPE";
}
</script>

</body>
</html>
