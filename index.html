<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Norepi SaaS</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  text-align: center;
}

.glow {
  position: absolute;
  width: 100%;
  height: 400px;
  top: 0;
  background: radial-gradient(circle, rgba(255,80,0,0.7), transparent 70%);
  filter: blur(120px);
}

nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
}

.hero {
  margin-top: 120px;
}

.hero h1 {
  font-size: 60px;
}

.gradient {
  background: linear-gradient(90deg, red, orange);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

button {
  margin-top: 30px;
  padding: 15px 30px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(90deg, red, orange);
  color: white;
  cursor: pointer;
}

.pricing {
  margin-top: 100px;
}

.card {
  background: #111;
  padding: 20px;
  margin: 20px auto;
  width: 250px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="glow"></div>

<nav>
  <div><b>Norepi</b></div>
  <div>Home • Plans • About</div>
</nav>

<div class="hero">
  <h1><span class="gradient">Unlimited</span><br>Service</h1>
  <p>Grow your business with our SaaS</p>
  <button>Get Started</button>
</div>

<div class="pricing">
  <div class="card">
    <h3>Basic</h3>
    <p>$29/mo</p>
  </div>

  <div class="card">
    <h3>Pro</h3>
    <p>$49/mo</p>
  </div>
</div>

</body>
</html>
