<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Norepi AI</title>

<style>
body {
  background: radial-gradient(circle at top, #0a0a0a, #000);
  color: white;
  font-family: -apple-system, sans-serif;
  text-align: center;
}

nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 50px;
}

.logo {
  font-weight: bold;
  font-size: 22px;
  background: linear-gradient(90deg, red, orange);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.hero h1 {
  font-size: 55px;
  margin-top: 80px;
}

.gradient {
  background: linear-gradient(90deg, red, orange);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.glass {
  margin: 40px auto;
  width: 90%;
  max-width: 600px;
  padding: 25px;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
}

textarea {
  width: 100%;
  height: 120px;
  background: transparent;
  border: none;
  color: white;
  outline: none;
}

button {
  margin-top: 15px;
  padding: 15px 30px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(90deg, red, orange);
  color: white;
  cursor: pointer;
}

.pricing {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-top: 80px;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 25px;
  border-radius: 20px;
  width: 220px;
}

footer {
  margin-top: 120px;
  opacity: 0.5;
}
</style>
</head>

<body>

<nav>
  <div class="logo">N</div>
  <div>Product • Pricing</div>
</nav>

<div class="hero">
  <h1><span class="gradient">Messages</span><br>That Get Replies</h1>
  <p>AI that writes texts people actually respond to.</p>
</div>

<div class="glass">
  <textarea id="input" placeholder="Write your message..."></textarea>
  <button onclick="improve()">Enhance</button>
  <p id="output"></p>
</div>

<div class="pricing">
  <div class="card">
    <h3>Free</h3>
    <p>3 uses</p>
  </div>

  <div class="card">
    <h3>Pro</h3>
    <p>$19/month</p>
    <button onclick="buy()">Upgrade</button>
  </div>
</div>

<footer>
  © 2026 Norepi. All rights reserved.
</footer>

<script>
let uses = localStorage.getItem("uses") || 0;
let pro = localStorage.getItem("pro") === "true";

function improve() {
  let text = document.getElementById("input").value;

  if (!text) {
    alert("Write something first.");
    return;
  }

  if (!pro && uses >= 3) {
    alert("Limit reached. Upgrade to Pro.");
    return;
  }

  const styles = [
    "Confident message:",
    "Persuasive version:",
    "Natural response:",
    "High-converting message:"
  ];

  let style = styles[Math.floor(Math.random() * styles.length)];

  let result = style + "\n\n" + text + " — rewritten to sound more engaging and increase reply rate.";

  document.getElementById("output").innerText = result;

  uses++;
  localStorage.setItem("uses", uses);
}

function buy() {
  window.location.href = "COLE_SEU_LINK_STRIPE_AQUI";
}
</script>

</body>
</html>
